<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Колесо баланса — Геннадий Николаев</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=33">
  <link rel="stylesheet" href="balance-wheel.css">
</head>
<body class="service-page balance-page">

  <div id="header-root"></div>
  <script src="header.js"></script>

  <main>
    <div class="container">
      <section class="page-hero">
        <a href="index.html" class="back-link">← Главная</a>
        <h1>Колесо баланса</h1>
      </section>
    </div>

    <div class="bw-app">
      <div class="bw-wheel-section">
        <svg id="wheel" viewBox="0 0 500 500"></svg>
      </div>
      <div class="bw-panel-section">
        <h2 class="bw-panel-title">Сферы жизни</h2>
        <div id="sectors-list"></div>
        <div id="input-area">
          <input type="text" id="new-sector-input" placeholder="Введите сферу..." maxlength="30">
        </div>
      </div>
    </div>

    <div id="confirm-modal" class="bw-modal bw-hidden">
      <div class="bw-modal-content">
        <p id="confirm-text"></p>
        <div class="bw-modal-buttons">
          <button id="confirm-yes">Да</button>
          <button id="confirm-no">Отмена</button>
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
  <script src="balance-wheel.js"></script>
</body>
</html>
